apiVersion: apps/v1
kind: Deployment
metadata:
  name: electricity-billing-deployment
  labels:
    app: electricity-billing

spec:
  replicas: 2
  selector:
    matchLabels:
      app: electricity-billing

  template:
    metadata:
      labels:
        app: electricity-billing

    spec:
      containers:
        - name: electricity-billing
          image: naveen14k/electricity-billing:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: electricity-billing-service

spec:
  type: NodePort
  selector:
    app: electricity-billing

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007